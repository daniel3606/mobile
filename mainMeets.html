<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Ann Arbor Skyline — Meets</title>
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <div class="page">
      <header>
        <div class="header-top">
          <h1><a href="index.html">Ann Arbor Skyline</a></h1>

          <div class="header-icon-toggles" role="group" aria-label="Display options">
            <input type="checkbox" id="dark-mode-toggle" class="theme-toggle" />
            <label for="dark-mode-toggle" class="icon-toggle" title="Dark mode">
              <span class="sr-only">Dark mode</span>
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <path fill="currentColor" d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.39 5.39 0 0 1-4.4 2.26 5.403 5.403 0 0 1-3.14-9.8c.44-.06.9-.1 1.36-.1z"/>
              </svg>
            </label>
            <input type="checkbox" id="contrast-toggle" class="theme-toggle" />
            <label for="contrast-toggle" class="icon-toggle" title="High contrast">
              <span class="sr-only">High contrast</span>
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true" focusable="false">
                <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2"/>
                <line x1="12" y1="3" x2="12" y2="21" stroke="currentColor" stroke-width="2"/>
              </svg>
            </label>
          </div>
        </div>

        <nav aria-label="Primary navigation">
          <ul>
            <li><a href="mainAthletes.html">Athletes</a></li>
            <li><a href="mainMeets.html">Meets</a></li>
          </ul>
        </nav>
      </header>

      <main>
        <form action="#" method="get">
          <fieldset>
            <legend>Search and sort</legend>

            <label for="search">Search</label>
            <input id="search" name="search" type="search" />

            <label for="sort">Sort</label>
            <select id="sort" name="sort">
              <option value="name-asc">Meet name (A–Z)</option>
              <option value="name-desc">Meet name (Z–A)</option>
              <option value="date-asc">Date (oldest first)</option>
              <option value="date-desc">Date (newest first)</option>
            </select>

            <button type="submit">Apply</button>
          </fieldset>
        </form>

        <section aria-labelledby="meets-heading">
          <h2 id="meets-heading">Meets</h2>

          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th scope="col">Meet Name</th>
                  <th scope="col">Meet ID</th>
                  <th scope="col">Date</th>
                  <th scope="col">Results</th>
                </tr>
              </thead>

              <tbody>
                <tr>
                  <td>
                    <a href="meets.html">Skyline Invite</a>
                  </td>
                  <td>229906</td>
                  <td>
                    <time datetime="2025-10-12">Oct 12, 2025</time>
                  </td>
                  <td>
                    <a href="https://www.athletic.net/CrossCountry/meet/229906/results/916818">
                      Official results
                    </a>
                  </td>
                </tr>

                <tr>
                  <td>City Championship</td>
                  <td>229907</td>
                  <td>
                    <time datetime="2025-11-01">Nov 1, 2025</time>
                  </td>
                  <td>—</td>
                </tr>

                <tr>
                  <td>Regional Qualifier</td>
                  <td>229908</td>
                  <td>
                    <time datetime="2025-11-15">Nov 15, 2025</time>
                  </td>
                  <td>—</td>
                </tr>
              </tbody>
            </table>
          </div>
        </section>
      </main>

      <footer>
        <p>&copy; Ann Arbor Skyline High School</p>
      </footer>
    </div>
  </body>
</html>
